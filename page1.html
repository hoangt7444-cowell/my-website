<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本の美しいページ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Serif JP', serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      max-width: 600px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
      line-height: 1.6;
      color: #ddd;
    }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 30px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(45deg, #4facfe, #00f2fe);
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-3px);
      
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ようこそ</h1>
    <p>これはシンプルで美しい日本語のウェブページです。デザインはモダンで、読みやすく、心地よい体験を提供します。</p>
    <a href="#" class="btn">もっと見る</a>
    <footer>
      <p>ありがとう • Thank you</p>
    </footer>
  </div>
</body>
</html>
