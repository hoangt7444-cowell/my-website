<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Unique Japanese Paragraphs</title>
</head>
<body>
  <h1>10,000 chuỗi không trùng</h1>
  <div id="root"></div>

  <script>
    const chars = ["あ","い","う","え","お","か","き","く","け","こ",
                   "さ","し","す","せ","そ","た","ち","つ","て","と"];

    const root = document.getElementById("root");
    const fragment = document.createDocumentFragment();

    const used = new Set();

    while (used.size < 11000) {
      let text = "";
      for (let i = 0; i < 4; i++) {
        text += chars[Math.floor(Math.random() * chars.length)];
      }

      if (!used.has(text)) {
        used.add(text);
        const p = document.createElement("p");
        p.textContent = text;
        fragment.appendChild(p);
      }
    }

    root.appendChild(fragment);
  </script>
</body>
</html>
